# DigitalOcean App Platform spec — Stawi web app.
# Region: Frankfurt (fra1). Deploy: `doctl apps create --spec .do/app.yaml`
name: stawi
region: fra
services:
  - name: web
    environment_slug: node-js
    github:
      repo: Bucrepinfo-lab/Stawi
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm install && npm run generate --workspace @stawi/db && npm run build --workspace @stawi/web
    run_command: npm run start --workspace @stawi/web
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
    envs:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CLERK_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CLERK_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: MOBILE_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MPESA_CONSUMER_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MPESA_CONSUMER_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: MPESA_PASSKEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: PAYSTACK_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: FLW_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CRON_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: AT_USERNAME
        scope: RUN_TIME
        type: SECRET
      - key: AT_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MPESA_ENV
        value: sandbox
      - key: MPESA_SHORTCODE
        value: "174379" 
      - key: NEXT_PUBLIC_ROOT_DOMAIN
        scope: RUN_AND_BUILD_TIME
