<svg width="340" height="96" viewBox="0 0 340 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stawi">
  <defs>
    <linearGradient id="stawiForest" x1="8" y1="8" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2f855a"/>
      <stop offset="1" stop-color="#14352a"/>
    </linearGradient>
    <linearGradient id="stawiGold" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#f0c05a"/>
      <stop offset="1" stop-color="#e0a32e"/>
    </linearGradient>
  </defs>

  <!-- Icon token -->
  <rect x="4" y="4" width="88" height="88" rx="24" fill="url(#stawiForest)"/>

  <!-- Chama / rotating-savings arc -->
  <path d="M24 62 A24 24 0 1 1 68 44" stroke="#e0a32e" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- Growth bars (table banking → thriving) -->
  <rect x="31" y="54" width="9" height="18" rx="4.5" fill="#f7f3ea"/>
  <rect x="43.5" y="44" width="9" height="28" rx="4.5" fill="#f7f3ea"/>
  <rect x="56" y="32" width="9" height="40" rx="4.5" fill="url(#stawiGold)"/>

  <!-- Coin / sun of prosperity -->
  <circle cx="60.5" cy="24" r="8" fill="url(#stawiGold)"/>
  <circle cx="60.5" cy="24" r="8" stroke="#14352a" stroke-width="1.5" opacity="0.25"/>

  <!-- Wordmark -->
  <text x="112" y="60" font-family="Fraunces, Georgia, 'Times New Roman', serif" font-size="46" font-weight="600" fill="#14352a" letter-spacing="0.5">Stawi</text>
  <text x="113" y="79" font-family="'Hanken Grotesk', system-ui, sans-serif" font-size="11.5" font-weight="700" letter-spacing="3.2" fill="#8a938b">SAVE · GROW · THRIVE</text>
</svg>
