function renderVals(){
  const l=window.__lang||'en';
  const vals=(VALUES[l]||VALUES.en);
  const open=window.__valOpen;
  document.getElementById('vals').innerHTML =
    vals.map((v,i)=>'<button class="val" style="cursor:pointer;font-family:inherit;'+(open===i?'background:var(--forestD);color:var(--bone);border-color:var(--forestD)':'')+'" onclick="toggleVal('+i+')">'+v+(open===i?' ✕':'')+'</button>').join('');
  const panel=document.getElementById('valPanel');
  if(open===null||open===undefined){ if(panel) panel.remove(); return; }
  const d=(VALUE_DETAILS[l]||VALUE_DETAILS.en);
  const pitch=(d.items&&d.items[open])||VALUE_DETAILS.en.items[open]||'';
  const html='<div id="valPanel" style="margin-top:12px;background:var(--bone2);border:1px solid var(--gold);border-radius:12px;padding:13px 15px">'
    +'<div style="font-size:13px;font-weight:800;color:var(--forestD)">'+vals[open]+'</div>'
    +'<p style="margin-top:6px;font-size:13.5px;color:var(--ink2);line-height:1.6">'+pitch+'</p>'
    +'<a href="'+(VALUE_LINKS[open]||'#')+'" style="display:inline-block;margin-top:8px;font-size:13px;font-weight:800;color:var(--forestD);text-decoration:none">'+(d.cta||VALUE_DETAILS.en.cta)+'</a></div>';
  if(panel) panel.outerHTML=html; else document.getElementById('vals').insertAdjacentHTML('afterend', html);
}
function toggleVal(i){ window.__valOpen = (window.__valOpen===i? null : i); renderVals(); }

function setLang(l){
  const t = Object.assign({}, T.en, T[l]||{});
  for (const k of ['kicker','h1a','grow','h1b','sub','open','visionT','vision','missionT','mission','valuesT','nicheKicker','nicheH','nicheP','seeEngine']){
    const el=document.getElementById(k); if(el && t[k]) el.textContent=t[k];
  }
  document.getElementById('pricing').textContent = t.pricing||'Pricing';
  document.getElementById('chips').innerHTML=(PILLARS[l]||PILLARS.en).map(p=>'<a class="chip" href="#">'+p+'</a>').join('');
  window.__lang=l; window.__valOpen=null;
  renderVals();
  document.documentElement.dir = l==='ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = l;
  document.getElementById('lang').value=l;
  try{localStorage.setItem('stawiLang',l);}catch(e){}
}
