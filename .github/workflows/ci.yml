name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Generate Prisma client
        run: npm run generate --workspace @stawi/db
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests (core)
        run: npm run test
      - name: Build web
        run: npm run build --workspace @stawi/web
        env:
          # Well-formed dummy key (base64 domain + $) — prerender validates the
          # format; a bare placeholder string fails the /_not-found export.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_placeholder

  deploy:
    needs: build-test
    # Only attempt deployment when explicitly enabled (repo Settings → Variables
    # → DEPLOY_ENABLED=true) AND the DO secrets exist — otherwise this job fails
    # on every push and keeps CI red before launch.
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Trigger App Platform deployment
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }} --wait
